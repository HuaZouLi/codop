name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.7.68-codop.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            label: linux-x64
            args: ''
          - platform: macos-latest
            label: macos
            args: ''
          - platform: windows-latest
            label: windows-x64
            args: '--config src-tauri/tauri.windows.conf.json'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.label }}

      - name: Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libasound2-dev \
            pkg-config \
            build-essential

      - name: macOS deps (cmake for whisper-rs)
        if: matrix.platform == 'macos-latest'
        run: brew install cmake

      - name: Windows deps (LLVM for bindgen)
        if: matrix.platform == 'windows-latest'
        run: choco install llvm -y --version=18.1.8
        shell: pwsh

      - name: Install npm deps
        run: npm ci

      - name: Build with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'codop ${{ github.event.inputs.tag || github.ref_name }}'
          releaseBody: |
            codop（牛马版） — Codex agent GUI fork with Linux/Windows support and Chinese UI.

            **Requirement**: install the OpenAI Codex CLI separately (`npm i -g @openai/codex` or `brew install openai/tap/codex`).

            Built from commit ${{ github.sha }}.
          releaseDraft: true
          prerelease: false
          tauriScript: npm run tauri --
          args: ${{ matrix.args }}
